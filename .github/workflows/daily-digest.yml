name: Daily Digest

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = 北京时间 08:00
    - cron: '0 4 * * *' # UTC 04:00 = 北京时间 12:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Debug FreshRSS connectivity
        run: |
          echo "=== Response Headers ==="
          curl -s -D - -o /tmp/resp.html "$FRESHRSS_API_URL/accounts/ClientLogin" \
            -X POST -d "Email=$FRESHRSS_USERNAME&Passwd=$FRESHRSS_PASSWORD" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            | head -30
          echo ""
          echo "=== Response Body (first 50 lines) ==="
          head -50 /tmp/resp.html
        env:
          FRESHRSS_API_URL: ${{ secrets.FRESHRSS_API_URL }}
          FRESHRSS_USERNAME: ${{ secrets.FRESHRSS_USERNAME }}
          FRESHRSS_PASSWORD: ${{ secrets.FRESHRSS_PASSWORD }}

      - name: Fetch articles
        run: pnpm run fetch
        env:
          FRESHRSS_API_URL: ${{ secrets.FRESHRSS_API_URL }}
          FRESHRSS_USERNAME: ${{ secrets.FRESHRSS_USERNAME }}
          FRESHRSS_PASSWORD: ${{ secrets.FRESHRSS_PASSWORD }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_BROWSER_RENDERING_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: daily-digest-data

      - name: Summarize with AI
        run: pnpm run summarize
        env:
          FRESHRSS_API_URL: ${{ secrets.FRESHRSS_API_URL }}
          FRESHRSS_USERNAME: ${{ secrets.FRESHRSS_USERNAME }}
          FRESHRSS_PASSWORD: ${{ secrets.FRESHRSS_PASSWORD }}
          AI_MODEL: ${{ vars.AI_MODEL || 'anthropic:claude-sonnet-4-6' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: daily-digest-data

      - name: Render HTML
        run: pnpm run render
        env:
          R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: daily-digest-data

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
